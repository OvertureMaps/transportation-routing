# Inspired by: https://github.com/stefanbuck/ristorante
# See: https://stefanbuck.com/blog/codeless-contributions-with-github-issue-forms
---

name: Issue labeler
on:
  issues:
    types: [ opened ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  label-issues-policy:
    name: Label issues with policy templates
    runs-on: ubuntu-latest

    permissions:
      contents: read  # Required for checkout to read issue templates
      issues: write  # Required to add labels to issues

    concurrency:
      group: ${{ github.workflow }}-${{ github.event.issue.number }}-${{ matrix.template }}
      cancel-in-progress: true

    strategy:
      matrix:
        template: [ bug.yml, feature.yml, animals.yml, phase_of_development.yml ]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Parse issue form
        uses: stefanbuck/github-issue-parser@cb6e97157cbf851e3a393ff8d57c93a484cc323f # v3.2.5
        id: issue-parser
        with:
          template-path: .github/ISSUE_TEMPLATE/${{ matrix.template }}

      - name: Set labels based on policy
        uses: redhat-plumbers-in-action/advanced-issue-labeler@b80ae64e3e156e9c111b075bfa04b295d54e8e2e # v3.2.4
        with:
          issue-form: ${{ steps.issue-parser.outputs.jsonString }}
          template: ${{ matrix.template }}
          token: ${{ secrets.GITHUB_TOKEN }}

  label-issues-default-policy:
    name: Label issues with default policy
    runs-on: ubuntu-latest

    permissions:
      contents: read  # Required for checkout to read issue templates
      issues: write  # Required to add labels to issues

    concurrency:
      group: ${{ github.workflow }}-${{ github.event.issue.number }}-${{ matrix.template }}
      cancel-in-progress: true

    strategy:
      matrix:
        template: [ default-policy.yml ]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Parse issue form
        uses: stefanbuck/github-issue-parser@cb6e97157cbf851e3a393ff8d57c93a484cc323f # v3.2.5
        id: issue-parser
        with:
          template-path: .github/ISSUE_TEMPLATE/${{ matrix.template }}

      - name: Set labels based on policy
        uses: redhat-plumbers-in-action/advanced-issue-labeler@b80ae64e3e156e9c111b075bfa04b295d54e8e2e # v3.2.4
        with:
          issue-form: ${{ steps.issue-parser.outputs.jsonString }}
          token: ${{ secrets.GITHUB_TOKEN }}

  label-issues-without-policy:
    name: Label issues without policy
    runs-on: ubuntu-latest

    permissions:
      contents: read  # Required for checkout to read issue templates
      issues: write  # Required to add labels to issues

    concurrency:
      group: ${{ github.workflow }}-${{ github.event.issue.number }}-${{ matrix.template }}
      cancel-in-progress: true

    strategy:
      matrix:
        template: [ default.yml ]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Parse issue form
        uses: stefanbuck/github-issue-parser@cb6e97157cbf851e3a393ff8d57c93a484cc323f # v3.2.5
        id: issue-parser
        with:
          template-path: .github/ISSUE_TEMPLATE/${{ matrix.template }}

      - name: Set labels based on policy
        uses: redhat-plumbers-in-action/advanced-issue-labeler@b80ae64e3e156e9c111b075bfa04b295d54e8e2e # v3.2.4
        with:
          issue-form: ${{ steps.issue-parser.outputs.jsonString }}
          section: without-policy
          block-list: |
            Other
          token: ${{ secrets.GITHUB_TOKEN }}
